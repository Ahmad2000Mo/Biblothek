<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brot &amp; Butter - Login (Studenten-Version)</title>
  <link rel="stylesheet" href="login.css">
  <script src="login.js" defer></script>
</head>
<body>

  <div class="login-container">
    <div class="header">
      <h1>Brot &amp; Butter</h1>
      <p class="subtitle">Mitarbeiter-Login</p>
    </div>

    <!-- Fehlermeldung bei falschem Login -->
    <div id="errorBanner" class="error-banner">
      ⚠️ Benutzername oder Passwort ist falsch!
    </div>

    <form action="login" method="POST">
      <div class="form-group">
        <label for="user">Benutzername:</label>
        <input type="text" id="user" name="user" required autocomplete="username">
      </div>

      <div class="form-group">
        <label for="passwd">Passwort:</label>
        <input type="password" id="passwd" name="passwd" required autocomplete="current-password">
      </div>

      <button type="submit">Anmelden</button>
    </form>

    <div class="footer-links">
      <a href="index.html">Zurück zur Startseite</a>
    </div>
  </div>

</body>
</html>
